<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Dewdrop Patch</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#aee7f9}
canvas{display:block;touch-action:none}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
"use strict";
(function(){
var send=function(m){try{parent.postMessage(m,"*")}catch(e){}};
var cv=document.getElementById('c'),ctx=cv.getContext('2d');
var W=innerWidth,H=innerHeight,dpr=1;
var TAU=Math.PI*2;

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
var seed=1234567,rng=mulberry32(seed);

var TIERS=[
 {n:'Sprout',c:'#8fd14f',d:'#4c8a1f'},
 {n:'Radish',c:'#f77fb0',d:'#c2417d'},
 {n:'Tomato',c:'#f95b3d',d:'#b83318'},
 {n:'Lemon',c:'#ffd23f',d:'#d09a00'},
 {n:'Apple',c:'#e63946',d:'#9c1f2b'},
 {n:'Eggplant',c:'#8e5bc0',d:'#5a3086'},
 {n:'Melon',c:'#c9e07b',d:'#7a9b2c'},
 {n:'Watermelon',c:'#3f9b4f',d:'#20642c'},
 {n:'Pumpkin',c:'#ffb020',d:'#b56b00'}
];
var BASE_R=[14,18,24,31,39,49,61,75,92];
var bed=null,S=1,RADII=[];

var balls=[],parts=[],floats=[];
var state='title'; // title | play | over
var score=0,combo=0,lastMergeT=-9,dewCharge=0,DEW_NEED=6;
var cur=0,nxt=1,curIsDew=false,nxtIsDew=false;
var aimX=0,dropCd=0,elapsed=0,weedT=25,warnT=0,shake=0;
var paused=false,raf=0,lastT=0,aiming=false,lastAct=0;

function layout(old){
  var bw=Math.min(W-14,560);
  bed={x:(W-bw)/2,w:bw,floor:H-12,top:Math.max(108,H*0.2)};
  bed.danger=bed.top+30;
  bed.spawnY=Math.max(66,bed.top-36);
  S=bw/470;
  RADII=BASE_R.map(function(r){return r*S});
  if(old&&balls.length){
    var k=bed.w/old.w;
    for(var i=0;i<balls.length;i++){var b=balls[i];
      b.x=bed.x+(b.x-old.x)*k;
      b.y=bed.floor-(old.floor-b.y)*k;
      b.r*=k;
    }
  }
  aimX=Math.min(Math.max(aimX,bed.x+30),bed.x+bed.w-30);
}
function resize(){
  var old=bed?{x:bed.x,w:bed.w,floor:bed.floor}:null;
  W=innerWidth;H=innerHeight;dpr=Math.min(devicePixelRatio||1,3);
  cv.style.width=W+'px';cv.style.height=H+'px';
  cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);
  ctx.setTransform(dpr,0,0,dpr,0,0);
  layout(old);
}
addEventListener('resize',resize);
addEventListener('orientationchange',function(){setTimeout(resize,60)});

/* ---------- audio ---------- */
var ac=null;
function ensureAudio(){
  if(!ac){try{ac=new (window.AudioContext||window.webkitAudioContext)()}catch(e){}}
  if(ac&&ac.state==='suspended'){ac.resume()}
}
function tone(f0,f1,dur,type,g,delay){
  if(!ac)return;
  var t=ac.currentTime+(delay||0);
  var o=ac.createOscillator(),gn=ac.createGain();
  o.type=type||'sine';
  o.frequency.setValueAtTime(f0,t);
  o.frequency.exponentialRampToValueAtTime(Math.max(1,f1),t+dur);
  gn.gain.setValueAtTime(g||0.05,t);
  gn.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(gn);gn.connect(ac.destination);
  o.start(t);o.stop(t+dur+0.02);
}
function sfxDrop(){tone(300,180,0.12,'triangle',0.05)}
function sfxMerge(t,c){tone(300+t*55,520+t*80,0.18,'sine',0.06);if(c>1)tone(520+c*40,780+c*60,0.15,'triangle',0.04,0.05)}
function sfxPop(){tone(500,240,0.1,'square',0.03)}
function sfxDewReady(){tone(600,900,0.2,'sine',0.05);tone(800,1250,0.2,'sine',0.05,0.1)}
function sfxEnd(){tone(600,300,0.35,'sine',0.06);tone(450,220,0.4,'sine',0.05,0.18)}

/* ---------- game ---------- */
function rollTier(){
  var h=Math.min(0.24,elapsed/300),r=rng();
  if(r<0.34-h)return 0;
  if(r<0.62-h)return 1;
  if(r<0.86)return 2;
  return 3;
}
function mkBall(x,y,tier,type){
  var r=type==='dew'?RADII[2]:type==='weed'?RADII[1]*1.15:RADII[tier];
  return {x:x,y:y,vx:0,vy:0,r:r,tier:tier,type:type||'crop',age:0,pop:1.3,dead:false};
}
function reset(){
  balls.length=0;parts.length=0;floats.length=0;
  score=0;combo=0;dewCharge=0;lastMergeT=-9;
  elapsed=0;weedT=25;warnT=0;shake=0;dropCd=0;
  cur=rollTier();nxt=rollTier();curIsDew=false;nxtIsDew=false;
  aimX=bed.x+bed.w/2;
  send({t:'gg:score',v:0});
}
function startRound(){state='play';send({t:'gg:roundStart'})}
function gameOver(){
  if(state!=='play')return;
  state='over';shake=8;sfxEnd();
  send({t:'gg:roundEnd',score:Math.round(score)});
}
function activity(){var n=Date.now();if(n-lastAct>5000){lastAct=n;send({t:'gg:activity'})}}
function clampAim(x){return Math.min(Math.max(x,bed.x+20),bed.x+bed.w-20)}
function addScore(p,x,y){score+=p;send({t:'gg:score',v:Math.round(score)});floatTxt(x,y,'+'+p,'#fffbe8')}
function floatTxt(x,y,s,c){floats.push({x:x,y:y,s:s,c:c,t:0});if(floats.length>30)floats.shift()}
function burst(x,y,c,n){
  for(var i=0;i<n;i++){
    if(parts.length>220)break;
    var a=rng()*TAU,sp=60+rng()*220;
    parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-80,t:0,c:c,r:2+rng()*4});
  }
}
function bigBurst(x,y){burst(x,y,'#ffd23f',30);burst(x,y,'#ffffff',18);floatTxt(x,y-40,'GOLDEN!','#ffd23f');shake=Math.max(shake,12)}

function popWeed(w){
  if(w.dead)return;
  w.dead=true;addScore(15,w.x,w.y);burst(w.x,w.y,'#8a9b5a',12);sfxPop();
}
function upgrade(o,fromX,fromY){
  o.dead=true;
  combo=(elapsed-lastMergeT<2.4)?combo+1:1;lastMergeT=elapsed;
  var pts;
  if(o.tier>=8){pts=500*combo;bigBurst(o.x,o.y)}
  else{
    var nb=mkBall(o.x,o.y,o.tier+1,'crop');nb.pop=1.45;balls.push(nb);
    pts=(o.tier+2)*(o.tier+2)*4*combo;
  }
  addScore(pts,o.x,o.y-o.r);
  burst(o.x,o.y,'#7fd4ff',16);sfxMerge(o.tier,combo);shake=Math.max(shake,4);
}
function doMerge(a,b){
  a.dead=true;b.dead=true;
  var mx=(a.x+b.x)/2,my=(a.y+b.y)/2,t=a.tier,pts;
  combo=(elapsed-lastMergeT<2.4)?combo+1:1;lastMergeT=elapsed;
  dewCharge=Math.min(DEW_NEED,dewCharge+1);
  if(dewCharge>=DEW_NEED&&!nxtIsDew&&!curIsDew){
    nxtIsDew=true;dewCharge=0;sfxDewReady();
    floatTxt(bed.x+bed.w/2,bed.spawnY+40,'DEW READY!','#5ec2f2');
  }
  if(t>=8){pts=500*combo;bigBurst(mx,my)}
  else{
    var nb=mkBall(mx,my,t+1,'crop');nb.vy=-60;nb.pop=1.45;balls.push(nb);
    pts=(t+2)*(t+2)*4*combo;
    shake=Math.max(shake,2+t*1.2);
  }
  addScore(pts,mx,my-20);
  burst(mx,my,TIERS[Math.min(t+1,8)].c,10+t*3);
  sfxMerge(t,combo);
  var mr=RADII[Math.min(t+1,8)];
  for(var i=0;i<balls.length;i++){var w=balls[i];
    if(w.type==='weed'&&!w.dead&&Math.hypot(w.x-mx,w.y-my)<mr+w.r+14)popWeed(w);
  }
}
function contact(a,b){
  if(a.dead||b.dead)return;
  if(a.type==='dew'||b.type==='dew'){
    var dew=a.type==='dew'?a:b,o=a.type==='dew'?b:a;
    if(o.type==='dew')return;
    dew.dead=true;burst(dew.x,dew.y,'#9fe0ff',10);
    if(o.type==='weed')popWeed(o);else upgrade(o);
    return;
  }
  if(a.type==='weed'||b.type==='weed')return;
  if(a.tier===b.tier)doMerge(a,b);
}
function phys(dt){
  var G=2000*Math.max(S,0.6),i,j,a,b;
  for(i=0;i<balls.length;i++){
    b=balls[i];b.age+=dt;
    b.vy+=G*dt;
    b.vx*=Math.pow(0.995,dt*60);
    b.x+=b.vx*dt;b.y+=b.vy*dt;
    b.pop+=(1-b.pop)*Math.min(1,dt*9);
    if(b.x-b.r<bed.x){b.x=bed.x+b.r;b.vx*=-0.25}
    if(b.x+b.r>bed.x+bed.w){b.x=bed.x+bed.w-b.r;b.vx*=-0.25}
    if(b.y+b.r>bed.floor){
      b.y=bed.floor-b.r;
      if(b.vy>0)b.vy*=-0.15;
      b.vx*=Math.pow(0.9,dt*60);
      if(Math.abs(b.vy)<30)b.vy=0;
    }
  }
  for(var it=0;it<3;it++){
    for(i=0;i<balls.length;i++){
      a=balls[i];if(a.dead)continue;
      for(j=i+1;j<balls.length;j++){
        b=balls[j];if(b.dead)continue;
        var dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy),min=a.r+b.r;
        if(d<min){
          if(d<0.01){d=0.01;dx=0.01;dy=0}
          var nx=dx/d,ny=dy/d,ov=min-d;
          var m1=a.r*a.r,m2=b.r*b.r,tm=m1+m2;
          a.x-=nx*ov*(m2/tm);a.y-=ny*ov*(m2/tm);
          b.x+=nx*ov*(m1/tm);b.y+=ny*ov*(m1/tm);
          var vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
          if(vn<0){
            var imp=-1.12*vn/(1/m1+1/m2);
            a.vx-=imp*nx/m1;a.vy-=imp*ny/m1;
            b.vx+=imp*nx/m2;b.vy+=imp*ny/m2;
          }
          if(it===0)contact(a,b);
        }
      }
    }
  }
  balls=balls.filter(function(x){return !x.dead});
}
function drop(){
  if(dropCd>0||state!=='play')return;
  dropCd=0.5;
  var r=curIsDew?RADII[2]:RADII[cur];
  var x=Math.min(Math.max(aimX,bed.x+r+2),bed.x+bed.w-r-2);
  var b=mkBall(x,bed.spawnY,cur,curIsDew?'dew':'crop');
  b.vy=140;balls.push(b);
  sfxDrop();
  cur=nxt;curIsDew=nxtIsDew;
  nxt=rollTier();nxtIsDew=false;
  if(balls.length>140)gameOver();
}

/* ---------- input ---------- */
cv.addEventListener('pointerdown',function(e){
  e.preventDefault();ensureAudio();activity();
  if(state==='title'){startRound();aiming=true;aimX=clampAim(e.clientX);return}
  if(state==='over'){reset();startRound();return}
  aiming=true;aimX=clampAim(e.clientX);
});
cv.addEventListener('pointermove',function(e){
  e.preventDefault();
  if(aiming&&state==='play')aimX=clampAim(e.clientX);
});
addEventListener('pointerup',function(){
  if(aiming){aiming=false;if(state==='play')drop()}
  activity();
});
addEventListener('pointercancel',function(){aiming=false});
cv.addEventListener('contextmenu',function(e){e.preventDefault()});
document.addEventListener('touchmove',function(e){e.preventDefault()},{passive:false});
addEventListener('keydown',function(e){
  ensureAudio();activity();
  if(state==='title'){startRound();return}
  if(state==='over'){if(e.key===' '||e.key==='Enter'){reset();startRound()}return}
  if(e.key==='ArrowLeft')aimX=clampAim(aimX-24);
  else if(e.key==='ArrowRight')aimX=clampAim(aimX+24);
  else if(e.key==='ArrowDown'||e.key===' ')drop();
});

/* ---------- drawing ---------- */
function drawCrop(x,y,r,tier,pop){
  ctx.save();ctx.translate(x,y);var p=pop||1;ctx.scale(p,p);
  var T=TIERS[tier];
  ctx.lineWidth=Math.max(2.5,r*0.11);
  ctx.strokeStyle='#3a2a1a';ctx.fillStyle=T.c;
  ctx.beginPath();ctx.arc(0,0,r,0,TAU);ctx.fill();ctx.stroke();
  if(tier===6||tier===7){
    ctx.strokeStyle=T.d;ctx.lineWidth=Math.max(2,r*0.13);
    for(var i=-1;i<=1;i++){
      ctx.beginPath();
      ctx.ellipse(0,0,Math.abs(i)?r*0.55:r*0.15,r*0.92,0,-1.2,1.2);
      ctx.save();ctx.translate(i*r*0.45,0);
      ctx.restore();
      ctx.stroke();
    }
    ctx.beginPath();ctx.ellipse(-r*0.5,0,r*0.28,r*0.85,0,0,TAU);ctx.stroke();
    ctx.beginPath();ctx.ellipse(r*0.5,0,r*0.28,r*0.85,0,0,TAU);ctx.stroke();
  }
  if(tier===8){
    ctx.strokeStyle=T.d;ctx.lineWidth=Math.max(2,r*0.1);
    ctx.beginPath();ctx.ellipse(-r*0.42,0,r*0.3,r*0.9,0,0,TAU);ctx.stroke();
    ctx.beginPath();ctx.ellipse(r*0.42,0,r*0.3,r*0.9,0,0,TAU);ctx.stroke();
    ctx.beginPath();ctx.ellipse(0,0,r*0.12,r*0.95,0,0,TAU);ctx.stroke();
  }
  if(tier===1){
    ctx.fillStyle='#ffffff';
    ctx.beginPath();ctx.arc(0,r*0.55,r*0.35,0,TAU);ctx.fill();
  }
  ctx.fillStyle='#4c8a1f';ctx.strokeStyle='#2f5c10';ctx.lineWidth=Math.max(1.6,r*0.07);
  ctx.beginPath();ctx.ellipse(-r*0.24,-r*0.98,r*0.32,r*0.16,-0.6,0,TAU);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.ellipse(r*0.24,-r*0.98,r*0.32,r*0.16,0.6,0,TAU);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.35)';
  ctx.beginPath();ctx.ellipse(-r*0.35,-r*0.35,r*0.26,r*0.16,-0.7,0,TAU);ctx.fill();
  var er=Math.max(1.6,r*0.09);
  ctx.fillStyle='#3a2a1a';
  ctx.beginPath();ctx.arc(-r*0.28,-r*0.03,er,0,TAU);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.28,-r*0.03,er,0,TAU);ctx.fill();
  ctx.strokeStyle='#3a2a1a';ctx.lineWidth=Math.max(1.5,r*0.07);
  ctx.beginPath();ctx.arc(0,r*0.14,r*0.22,0.35,Math.PI-0.35);ctx.stroke();
  ctx.restore();
}
function drawDew(x,y,r,pop){
  ctx.save();ctx.translate(x,y);ctx.scale(pop,pop);
  ctx.fillStyle='rgba(120,205,250,0.85)';
  ctx.strokeStyle='#1e6fa8';ctx.lineWidth=Math.max(2.5,r*0.11);
  ctx.beginPath();
  ctx.moveTo(0,-r*1.25);
  ctx.quadraticCurveTo(r*0.95,-r*0.25,r*0.82,r*0.4);
  ctx.arc(0,r*0.28,r*0.82,0.35,Math.PI-0.35);
  ctx.quadraticCurveTo(-r*0.95,-r*0.25,0,-r*1.25);
  ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.ellipse(-r*0.3,-r*0.1,r*0.2,r*0.32,-0.4,0,TAU);ctx.fill();
  ctx.fillStyle='#1e6fa8';
  ctx.beginPath();ctx.arc(-r*0.22,r*0.18,Math.max(1.5,r*0.08),0,TAU);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.22,r*0.18,Math.max(1.5,r*0.08),0,TAU);ctx.fill();
  ctx.strokeStyle='#1e6fa8';ctx.lineWidth=Math.max(1.4,r*0.06);
  ctx.beginPath();ctx.arc(0,r*0.32,r*0.18,0.35,Math.PI-0.35);ctx.stroke();
  ctx.restore();
}
function drawWeed(x,y,r,pop){
  ctx.save();ctx.translate(x,y);ctx.scale(pop,pop);
  ctx.fillStyle='#6f7d3c';ctx.strokeStyle='#3c4420';ctx.lineWidth=Math.max(2.5,r*0.12);
  ctx.beginPath();
  var sp=8;
  for(var i=0;i<sp*2;i++){
    var ang=i/(sp*2)*TAU,rr=(i%2===0)?r*1.15:r*0.8;
    var px=Math.cos(ang)*rr,py=Math.sin(ang)*rr;
    if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
  }
  ctx.closePath();ctx.fill();ctx.stroke();
  ctx.fillStyle='#3c4420';
  ctx.beginPath();ctx.arc(-r*0.28,-r*0.08,Math.max(1.6,r*0.1),0,TAU);ctx.fill();
  ctx.beginPath();ctx.arc(r*0.28,-r*0.08,Math.max(1.6,r*0.1),0,TAU);ctx.fill();
  ctx.strokeStyle='#3c4420';ctx.lineWidth=Math.max(1.6,r*0.08);
  ctx.beginPath();ctx.arc(0,r*0.35,r*0.22,Math.PI+0.4,TAU-0.4);ctx.stroke();
  ctx.restore();
}
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();
}
function drawBG(){
  var g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#a5e2f7');g.addColorStop(0.5,'#d3f0d9');g.addColorStop(1,'#bfe3a8');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffe28a';ctx.strokeStyle='#e8b93c';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(W-52,54,26,0,TAU);ctx.fill();ctx.stroke();
  ctx.strokeStyle='rgba(232,185,60,0.7)';
  for(var i=0;i<8;i++){
    var a=i/8*TAU;
    ctx.beginPath();ctx.moveTo(W-52+Math.cos(a)*33,54+Math.sin(a)*33);
    ctx.lineTo(W-52+Math.cos(a)*42,54+Math.sin(a)*42);ctx.stroke();
  }
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath();ctx.arc(W*0.2,70,18,0,TAU);ctx.arc(W*0.2+22,64,22,0,TAU);ctx.arc(W*0.2+46,72,16,0,TAU);ctx.fill();
  ctx.fillStyle='#9ed46c';
  ctx.beginPath();ctx.ellipse(W*0.15,bed.top+30,W*0.45,70,0,Math.PI,TAU);ctx.fill();
  ctx.fillStyle='#8bc456';
  ctx.beginPath();ctx.ellipse(W*0.85,bed.top+34,W*0.5,60,0,Math.PI,TAU);ctx.fill();
  ctx.fillStyle='#7db44e';
  ctx.fillRect(0,bed.top+30,W,H-bed.top-30);
  ctx.fillStyle='#5f9c3a';
  for(i=0;i<4;i++){
    var bx=(i<2)?bed.x*0.5:bed.x+bed.w+(W-bed.x-bed.w)*0.5;
    var by=bed.top+90+i%2*140;
    if(bed.x>28){ctx.beginPath();ctx.arc(bx,by,20,0,TAU);ctx.arc(bx-14,by+10,15,0,TAU);ctx.arc(bx+14,by+10,15,0,TAU);ctx.fill()}
  }
  var sg=ctx.createLinearGradient(0,bed.top,0,bed.floor);
  sg.addColorStop(0,'#9c6a3e');sg.addColorStop(1,'#7a4e2a');
  ctx.fillStyle=sg;
  ctx.fillRect(bed.x,bed.top,bed.w,bed.floor-bed.top);
  ctx.fillStyle='rgba(60,38,18,0.18)';
  for(i=0;i<6;i++){
    var ry=bed.top+40+(bed.floor-bed.top-60)*i/5;
    ctx.fillRect(bed.x+8,ry,bed.w-16,3);
  }
  ctx.strokeStyle='#6d4426';ctx.lineWidth=3;
  var plankW=Math.max(10,12*S);
  ctx.fillStyle='#b07b42';
  roundRect(bed.x-plankW,bed.top-8,plankW,bed.floor-bed.top+12,5);ctx.fill();ctx.stroke();
  roundRect(bed.x+bed.w,bed.top-8,plankW,bed.floor-bed.top+12,5);ctx.fill();ctx.stroke();
  roundRect(bed.x-plankW,bed.floor-2,bed.w+plankW*2,plankW+2,5);ctx.fill();ctx.stroke();
  var warn=Math.min(1,warnT/2);
  ctx.strokeStyle='rgba(230,'+Math.round(90-warn*40)+','+Math.round(90-warn*40)+','+(0.55+warn*0.45)+')';
  ctx.lineWidth=3+warn*2;
  ctx.setLineDash([10,8]);
  ctx.beginPath();ctx.moveTo(bed.x,bed.danger);ctx.lineTo(bed.x+bed.w,bed.danger);ctx.stroke();
  ctx.setLineDash([]);
  if(warn>0.05){
    ctx.fillStyle='rgba(230,70,70,'+(0.10+0.15*warn*(0.5+0.5*Math.sin(elapsed*10)))+')';
    ctx.fillRect(bed.x,bed.top-8,bed.w,bed.danger-bed.top+8);
  }
}
function drawBall(b){
  if(b.type==='dew')drawDew(b.x,b.y,b.r,b.pop);
  else if(b.type==='weed')drawWeed(b.x,b.y,b.r,b.pop);
  else drawCrop(b.x,b.y,b.r,b.tier,b.pop);
}
function drawHUD(){
  ctx.font='bold '+Math.min(22,W*0.055)+'px system-ui,sans-serif';
  var st=''+Math.round(score);
  var pw=Math.max(90,ctx.measureText(st).width+44);
  ctx.fillStyle='#fff8e6';ctx.strokeStyle='#5a3d22';ctx.lineWidth=3;
  roundRect(10,10,pw,38,19);ctx.fill();ctx.stroke();
  ctx.fillStyle='#5a3d22';ctx.textAlign='left';ctx.textBaseline='middle';
  ctx.fillText(st,44,30);
  drawCrop(28,29,10,8,1);
  var mw=Math.min(120,W*0.3),mx=W-mw-14,my=16;
  ctx.fillStyle='#fff8e6';ctx.strokeStyle='#5a3d22';ctx.lineWidth=3;
  roundRect(mx,my,mw,26,13);ctx.fill();ctx.stroke();
  var frac=(curIsDew||nxtIsDew)?1:dewCharge/DEW_NEED;
  if(frac>0){
    ctx.fillStyle=(curIsDew||nxtIsDew)?'#5ec2f2':'#8fd4f5';
    roundRect(mx+3,my+3,Math.max(10,(mw-6)*frac),20,10);ctx.fill();
  }
  drawDew(mx-4,my+13,9,1);
  if(curIsDew||nxtIsDew){
    ctx.fillStyle='#1e6fa8';ctx.font='bold 12px system-ui,sans-serif';ctx.textAlign='center';
    ctx.fillText('DEW!',mx+mw/2,my+13);
  }
  var nxX=W/2+Math.min(90,W*0.22),nxY=30;
  ctx.fillStyle='rgba(255,248,230,0.9)';ctx.strokeStyle='#5a3d22';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(nxX,nxY,20,0,TAU);ctx.fill();ctx.stroke();
  if(nxtIsDew)drawDew(nxX,nxY,10,1);else drawCrop(nxX,nxY,12,nxt,1);
  ctx.fillStyle='#5a3d22';ctx.font='bold 10px system-ui,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('NEXT',nxX,nxY+30);
  if(combo>1&&elapsed-lastMergeT<2.4&&state==='play'){
    ctx.font='bold '+Math.min(26,W*0.06)+'px system-ui,sans-serif';
    ctx.fillStyle='#ff8f2a';ctx.strokeStyle='#5a3d22';ctx.lineWidth=4;ctx.textAlign='center';
    ctx.strokeText('x'+combo+' COMBO',W/2,78);
    ctx.fillText('x'+combo+' COMBO',W/2,78);
  }
}
function drawCurrent(){
  if(state!=='play')return;
  var r=curIsDew?RADII[2]:RADII[cur];
  var x=Math.min(Math.max(aimX,bed.x+r+2),bed.x+bed.w-r-2);
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;ctx.setLineDash([5,7]);
  ctx.beginPath();ctx.moveTo(x,bed.spawnY+r);ctx.lineTo(x,bed.floor);ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='#4c8a1f';ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,bed.spawnY-r);ctx.stroke();
  var bob=Math.sin(elapsed*3)*2;
  if(dropCd>0.32){
    ctx.globalAlpha=0.4;
  }
  if(curIsDew)drawDew(x,bed.spawnY+bob,r,1);else drawCrop(x,bed.spawnY+bob,r,cur,1);
  ctx.globalAlpha=1;
}
function drawFx(dt){
  var i;
  for(i=parts.length-1;i>=0;i--){
    var p=parts[i];
    p.t+=dt;p.vy+=500*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.t>0.8){parts.splice(i,1);continue}
    ctx.globalAlpha=1-p.t/0.8;
    ctx.fillStyle=p.c;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r*(1-p.t*0.6),0,TAU);ctx.fill();
  }
  ctx.globalAlpha=1;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(i=floats.length-1;i>=0;i--){
    var f=floats[i];
    f.t+=dt;f.y-=42*dt;
    if(f.t>1){floats.splice(i,1);continue}
    ctx.globalAlpha=1-f.t;
    ctx.font='bold '+Math.min(20,W*0.05)+'px system-ui,sans-serif';
    ctx.strokeStyle='#3a2a1a';ctx.lineWidth=4;ctx.strokeText(f.s,f.x,f.y);
    ctx.fillStyle=f.c;ctx.fillText(f.s,f.x,f.y);
  }
  ctx.globalAlpha=1;
}
function drawSign(cx,cy,w,h,lines,sub){
  ctx.fillStyle='#b07b42';ctx.strokeStyle='#5a3d22';ctx.lineWidth=4;
  roundRect(cx-w/2,cy-h/2,w,h,14);ctx.fill();ctx.stroke();
  ctx.fillStyle='#8a5a30';
  roundRect(cx-w/2+8,cy-h/2+8,w-16,h-16,10);ctx.fill();
  ctx.fillStyle='#fff4dc';ctx.textAlign='center';ctx.textBaseline='middle';
  var fs=Math.min(24,W*0.055);
  ctx.font='bold '+fs+'px system-ui,sans-serif';
  for(var i=0;i<lines.length;i++)ctx.fillText(lines[i],cx,cy-h/2+26+i*(fs+8));
  if(sub){
    ctx.font='bold '+Math.min(15,W*0.04)+'px system-ui,sans-serif';
    ctx.fillStyle='#ffe0a0';
    ctx.fillText(sub,cx,cy+h/2-22);
  }
}
function draw(){
  ctx.save();
  if(shake>0.2){
    ctx.translate((rng()-0.5)*shake,(rng()-0.5)*shake);
  }
  drawBG();
  for(var i=0;i<balls.length;i++)drawBall(balls[i]);
  drawCurrent();
  ctx.restore();
  drawFx(fxDt);
  drawHUD();
  if(state==='title'){
    ctx.fillStyle='rgba(40,30,15,0.35)';ctx.fillRect(0,0,W,H);
    drawSign(W/2,H*0.42,Math.min(W-40,340),150,['Dewdrop Patch'],'Tap & drag to aim - release to drop!');
    drawCrop(W/2-60,H*0.42+18,18,2,1);
    drawDew(W/2,H*0.42+18,14,1);
    drawCrop(W/2+60,H*0.42+18,20,8,1);
  }
  if(state==='over'){
    ctx.fillStyle='rgba(40,30,15,0.45)';ctx.fillRect(0,0,W,H);
    drawSign(W/2,H*0.42,Math.min(W-40,340),170,['Bed Overflowed!','Harvest: '+Math.round(score)],'Tap to replant!');
  }
}

/* ---------- loop ---------- */
var fxDt=0.016;
function loop(t){
  raf=requestAnimationFrame(loop);
  var dt=Math.min(0.033,(t-lastT)/1000||0.016);
  lastT=t;fxDt=dt;
  if(state==='play'){
    elapsed+=dt;dropCd-=dt;
    phys(dt/2);phys(dt/2);
    weedT-=dt;
    if(weedT<=0){
      weedT=Math.max(6,18-elapsed*0.08);
      var w=mkBall(bed.x+34+rng()*(bed.w-68),bed.spawnY-10,0,'weed');
      w.vy=60;w.r*=(1+Math.min(0.5,elapsed/240));
      balls.push(w);
      floatTxt(w.x,w.y+34,'WEED!','#d7e6b0');
    }
    var over=false;
    for(var i=0;i<balls.length;i++){
      var b=balls[i];
      if(b.age>1.3&&Math.abs(b.vy)<50&&b.y-b.r<bed.danger){over=true;break}
    }
    warnT=over?warnT+dt:Math.max(0,warnT-dt*1.5);
    if(warnT>2)gameOver();
  }
  shake=Math.max(0,shake-dt*22);
  draw();
}

resize();
reset();
raf=requestAnimationFrame(loop);
send({t:'gg:ready'});
})();
</script>
